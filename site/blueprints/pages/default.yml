title: Default Page

columns:
  main:
    width: 2/3
    sections:
      fields:
        type: fields
        fields:
          text:
            type: textarea
            size: huge
  sidebar:
    width: 1/3
    sections:
      meta:
        type: fields
        fields:
          tags:
            label: Tags
            type: pages
            query: site.find('tags').children
            multiple: true
            layout: list
      pages:
        type: pages
        template: default
      files:
        type: files
