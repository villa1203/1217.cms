label: Vidéo
preview: fields
wysiwyg: true
fields:
  title:
    label: Titre
    type: text

  url:
    label: field.blocks.video.url.label
    type: url
    placeholder: field.blocks.video.url.placeholder

  video_file:
    label: Fichier vidéo
    type: files
    max: 1
    accept:
      extension: mp4, webm, ogg, mov

  toggle_ratio_1_1:
    width: 1/2
    label: Ratio 1/1
    type: toggle
    text:
      - "non, ratio d'origine"
      - "oui, image croppée et carrée"


  toggle_gap_left:
    width: 1/2
    label: Espace sur la gauche?
    type: toggle
    text:
      - "non, pas d'éspace"
      - "oui, un espace à gauche"

  toggle_is_large:
    width: 1/2
    label: Large
    help: prend 2 clones, mais avec des marge à gauche et à droite
    type: toggle
    text:
      - "non"
      - "oui"


  toggle_is_full:
    width: 1/2
    label: Pleine page
    type: toggle
    text:
      - "non"
      - "oui"

  caption:
    label: Légende
    type: writer
    inline: true
    marks:
      - bold
      - italic
      - link
  credits:
    width: 2/3
    label: crédits
    type: writer
    inline: true
    marks:
      - bold
      - italic
      - link
