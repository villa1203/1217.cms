label: Vidéo
preview: fields
wysiwyg: true
fields:
  title:
    label: Titre
    type: text
  url:
    label: field.blocks.video.url.label
    type: url
    placeholder: field.blocks.video.url.placeholder

  video_file:
    label: Fichier vidéo
    type: files
    max: 1
    accept:
      extension: mp4, webm, ogg, mov
  caption:
    label: Légende
    type: writer
    inline: true
    marks:
      - bold
      - italic
      - link
  credits:
    width: 2/3
    label: crédits
    type: writer
    inline: true
    marks:
      - bold
      - italic
      - link
