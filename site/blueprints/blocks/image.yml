name: Image
wysiwyg: true
preview: fields
icon: image
fields:
  image:
    label: Image
    type: files
    uploads:
      template: blocks/image
    query: model.images
    max: 1
    min: 1
    required: true
    layout: cards
    image:
      back: black
    size: huge
    width: 2/3

  toggle_ratio_1_1:
    width: 1/2
    label: Ratio 1/1
    type: toggle
    text:
      - "non, ratio d'origine"
      - "oui, image croppée et carrée"

  toggle_gap_left:
    width: 1/2
    label: Espace sur la gauche?
    type: toggle
    text:
      - "non, pas d'éspace"
      - "oui, un espace à gauche"

  toggle_is_large:
    width: 1/2
    label: Large
    help: prend 2 clones, mais avec des marge à gauche et à droite
    type: toggle
    text:
      - "non"
      - "oui"


  toggle_is_full:
    width: 1/2
    label: Pleine page
    type: toggle
    text:
      - "non"
      - "oui"


  caption:
    label: Légende
    type: writer
    inline: true
    marks:
      - bold
      - italic
      - link
  credits:
    width: 2/3
    label: crédits
    type: writer
    inline: true
    marks:
      - bold
      - italic
      - link
