name: Liste de pages
wysiwyg: true
preview: fields
fields:
  title:
    label: Titre
    type: text

  is_style_list:
    label: Style en liste?
    width: 1/3
    type: toggle
    text:
      - non (regular size)
      - oui (preview en liste)
    default: false


  pages_liste:
    label: Projet·s à afficher {{page.template}}
    type: pages
    query: site.index.filterBy('intendedTemplate', 'project')
    multiple: true
    layout: list
    width: 1/2
