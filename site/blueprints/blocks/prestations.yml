name: Prestations
wysiwyg: true
preview: fields

fields:
  title:
    label: Titre
    type: text
  text:
    label: Baseline
    type: writer
    inline: true
    marks:
      - bold
      - italic
      - link
  prestation_list:
    type: structure
    fields:
      prestation_list_title:
        label: Titre
        type: text

      prestation_list_description:
        label: Description
        type: writer
        inline: true
        marks:
          - bold
          - italic
          - link
      prestation_list_projects_linked:
        label: Projet·s associés
        type: pages
        query: site.index.filterBy('intendedTemplate', 'project')
        multiple: true
        layout: list
      prestation_list_includes_title:
        label: Titre liste 1
        type: text
        placeholder: Typical project includes
      prestation_list_includes:
        label: Liste 1 (un item par ligne)
        type: textarea
      prestation_list_details_title:
        label: Titre liste 2
        type: text
        placeholder: More Details
      prestation_list_details:
        label: Liste 2 (un item par ligne)
        type: textarea
